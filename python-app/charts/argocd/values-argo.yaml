redis-ha:
  enabled: false

controller:
  replicas: 1

repoServer:
  replicas: 1

applicationSet:
  replicas: 1

global:
  domain: argocd.test.com

certificate:
  enabled: false

server:
  replicas: 1
  ingress:
    enabled: true
    ingressClassName: nginx
    tls: false

configs:
  cm:
    url: http://argocd.test.com:9080
  params:
    server.insecure: "true"
  rbac:
    policy.default: role:readonly
    policy.csv: |
      g, admin, role:admin
    policy.matchMode: glob
    scopes: "[groups]"
