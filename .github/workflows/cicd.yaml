name: cicd

on:
  push:
    paths:
      - python-app/src/**
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Pin CLI versions used by the CD job so reproducibility doesn't depend on
  # whatever happens to be tagged `latest` on the upstream release.
  ARGOCD_VERSION: v3.4.2
  YQ_VERSION: v4.44.3

jobs:
  ci:
    runs-on: [self-hosted, linux]
    outputs:
      commit_id: ${{ env.COMMIT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Shorten commit id
        shell: bash
        # COMMIT_ID = the shortened 6-character version, derived from GITHUB_SHA (the full 40-character git commit hash)
        # BRANCH_NAME = could be used to identify staging such as "staging" or "production" such as "main"
        run: |
          echo "COMMIT_ID=${GITHUB_SHA::6}" >> "$GITHUB_ENV"

      # Required so the amd64 GitHub runner can build an arm64 layer for
      # Surface Pro 11 / Apple Silicon developers via cross-architecture emulation.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: python-app
          push: true
          provenance: false
          # Multi-arch: amd64 for cloud / Intel dev boxes, arm64 for Apple Silicon
          # and Snapdragon X (Surface Pro 11). Without this the image is amd64-only
          # and ARM64 nodes crash with "exec format error".
          platforms: linux/amd64,linux/arm64
          tags: christseng89/python-app:${{ env.COMMIT_ID }}

  cd:
    needs: ci
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect runner architecture
        id: arch
        shell: bash
        run: |
          case "$(uname -m)" in
            x86_64)  echo "tag=amd64" >> "$GITHUB_OUTPUT" ;;
            aarch64) echo "tag=arm64" >> "$GITHUB_OUTPUT" ;;
            *) echo "Unsupported arch $(uname -m)"; exit 1 ;;
          esac

      - name: Modify values file
        shell: bash
        run: |
          curl -sL "https://github.com/mikefarah/yq/releases/download/${{ env.YQ_VERSION }}/yq_linux_${{ steps.arch.outputs.tag }}" -o /tmp/yq
          chmod +x /tmp/yq
          cd python-app
          /tmp/yq -i '.image.tag = "${{needs.ci.outputs.commit_id}}"' charts/python-app/values.yaml

      - name: Commit changes
        uses: EndBug/add-and-commit@v9
        with:
          message: "Updates values.yaml with commit ${{needs.ci.outputs.commit_id}}"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # ARC runner pods don't have the argocd CLI pre-installed, so fetch it.
      # The in-cluster service DNS is used because argocd.test.com only resolves
      # via the Windows hosts file, which the runner pod can't see.
      - name: Install ArgoCD CLI
        shell: bash
        run: |
          curl -sSL -o /tmp/argocd "https://github.com/argoproj/argo-cd/releases/download/${{ env.ARGOCD_VERSION }}/argocd-linux-${{ steps.arch.outputs.tag }}"
          chmod +x /tmp/argocd
          /tmp/argocd version --client

      - name: Argocd app sync
        shell: bash
        run: |
          # --plaintext: argocd-server has `server.insecure: true`, so it answers
          # in plain HTTP. Without this flag the CLI hits an interactive
          # "server is not configured with TLS. Proceed (y/n)?" prompt and
          # fatals with EOF (exit code 20) in a non-interactive shell.
          # Default port with --plaintext is 80, which matches the service.
          /tmp/argocd login argocd-server.argocd.svc.cluster.local \
            --plaintext \
            --grpc-web \
            --username admin \
            --password "${{ secrets.ARGOCD_PASSWORD }}"
          /tmp/argocd app sync python-app
          /tmp/argocd app wait python-app --health --timeout 180
