name: mirror-cli-binaries

# One-shot mirror workflow.
#
# Copies CLI binaries from GitHub Releases (slow from Asia, especially for
# arm64 binaries) to Docker Hub (fast Cloudflare CDN with Asia POPs).
#
# Run this manually from the Actions tab whenever you bump ARGOCD_VERSION
# or YQ_VERSION in cicd.yaml. It runs on a GitHub-hosted runner where the
# fetch from GitHub Releases is fast (internal network), then pushes to
# Docker Hub for cicd.yaml's CD job to consume.

on:
  workflow_dispatch:
    inputs:
      argocd_version:
        description: "ArgoCD CLI version to mirror (e.g., v3.4.2). Leave blank to skip."
        required: false
        default: "v3.4.2"
      yq_version:
        description: "yq version to mirror (e.g., v4.44.3). Leave blank to skip."
        required: false
        default: "v4.44.3"

permissions:
  contents: read

jobs:
  mirror:
    # GitHub-hosted runner — fast egress to both GitHub Releases and Docker Hub
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Required to build a multi-arch manifest list (amd64 + arm64) from a
      # single amd64 GitHub-hosted runner.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Mirror ArgoCD CLI (amd64 + arm64)
        if: ${{ inputs.argocd_version != '' }}
        run: |
          set -euo pipefail
          mkdir -p ctx-argocd && cd ctx-argocd
          for arch in amd64 arm64; do
            echo "Downloading argocd ${{ inputs.argocd_version }} ${arch}…"
            time curl -fSL --retry 3 --retry-delay 5 -o "argocd-${arch}" \
              "https://github.com/argoproj/argo-cd/releases/download/${{ inputs.argocd_version }}/argocd-linux-${arch}"
            chmod +x "argocd-${arch}"
          done
          # CMD is required so consumers can `docker create` without supplying
          # an arg. The binary itself doesn't run as a container (FROM scratch
          # has no shell or libc to support a TTY), but setting CMD satisfies
          # the docker daemon's "no command specified" check.
          cat > Dockerfile <<'EOF'
          FROM scratch
          ARG TARGETARCH
          COPY argocd-${TARGETARCH} /argocd
          CMD ["/argocd"]
          EOF
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag christseng89/argocd-bin:${{ inputs.argocd_version }} \
            --push \
            .
          echo "::notice::Mirrored christseng89/argocd-bin:${{ inputs.argocd_version }} (amd64+arm64)"

      - name: Mirror yq (amd64 + arm64)
        if: ${{ inputs.yq_version != '' }}
        run: |
          set -euo pipefail
          mkdir -p ctx-yq && cd ctx-yq
          for arch in amd64 arm64; do
            echo "Downloading yq ${{ inputs.yq_version }} ${arch}…"
            time curl -fSL --retry 3 --retry-delay 5 -o "yq-${arch}" \
              "https://github.com/mikefarah/yq/releases/download/${{ inputs.yq_version }}/yq_linux_${arch}"
            chmod +x "yq-${arch}"
          done
          cat > Dockerfile <<'EOF'
          FROM scratch
          ARG TARGETARCH
          COPY yq-${TARGETARCH} /yq
          CMD ["/yq"]
          EOF
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag christseng89/yq-bin:${{ inputs.yq_version }} \
            --push \
            .
          echo "::notice::Mirrored christseng89/yq-bin:${{ inputs.yq_version }} (amd64+arm64)"

      - name: Install kubectl
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -x /tmp/kubectl ]; then
            echo "Cache miss — pulling kubectl from Docker Hub mirror..."
            ARCH="${{ steps.arch.outputs.tag }}"
            # Get stable version tag first (dl.k8s.io/release/stable.txt is tiny/fast)
            KUBECTL_VERSION=$(curl -fsSL --max-time 10 https://dl.k8s.io/release/stable.txt)
            IMG="christseng89/kubectl-bin:${KUBECTL_VERSION}"
            for i in 1 2 3; do
              if docker pull --platform "linux/${ARCH}" "$IMG"; then break; fi
              echo "Attempt $i failed; retrying in ${i}0s..."
              sleep "${i}0"
            done
            cid=$(docker create --platform "linux/${ARCH}" "$IMG" /kubectl)
            docker cp "$cid:/kubectl" /tmp/kubectl
            docker rm "$cid" >/dev/null
            chmod +x /tmp/kubectl
          else
            echo "Cache hit — using cached kubectl at /tmp/kubectl"
          fi
          sudo cp /tmp/kubectl /usr/local/bin/kubectl
          kubectl version --client

      - name: Summary
        if: always()
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## Mirror complete

          | Image | Tag | Pull command |
          |---|---|---|
          | argocd | ${{ inputs.argocd_version || '_(skipped)_' }} | \`docker pull christseng89/argocd-bin:${{ inputs.argocd_version }}\` |
          | yq     | ${{ inputs.yq_version     || '_(skipped)_' }} | \`docker pull christseng89/yq-bin:${{ inputs.yq_version }}\` |
          EOF
