apiVersion: scaffolder.backstage.io/v1beta3

kind: Template

metadata:
  name: python-template
  title: Python flask template
  description: Provisions a minimalistic flask application

spec:
  owner: development
  type: service

  parameters:
    - title: Fill in some steps
      required:
        - component_id
      properties:
        component_id:
          title: Component name
          type: string
          description: Provide a component (microservice) name
          pattern: "^([a-zA-Z][a-zA-Z0-9]*)(-[a-zA-Z0-9]+)*$"
          ui:autofocus: true
          ui:help: "Use kebab-case, e.g. my-service"
        repoVisibility:
          title: Repository visibility
          type: string
          description: "Private: source code hidden from public. Public: development only."
          default: private
          enum:
            - private
            - public
          enumNames:
            - "Private (recommended)"
            - "Public (dev only)"

  steps:
    - id: fetch-base
      name: Fetch Base
      action: fetch:template
      input:
        url: ./template
        values:
          app_name: ${{ parameters.component_id }}

    - id: publish
      name: Publish
      action: publish:github
      input:
        description: This is ${{ parameters.component_id }}
        repoUrl: github.com?owner=christseng89&repo=${{ parameters.component_id }}
        defaultBranch: main
        protectDefaultBranch: false
        repoVisibility: ${{ parameters.repoVisibility }}
        gitCommitMessage: "init commit"

    - id: register
      name: Register
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: "/catalog-info.yaml"

  output:
    links:
      - title: Repository
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Open in Catalog
        icon: catalog
        url: ${{ steps['register'].output.entityRef }}
