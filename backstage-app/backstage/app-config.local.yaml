app:
  listen:
    host: 0.0.0.0

backend:
  listen:
    host: 0.0.0.0
auth:
  environment: development
  providers:
    github:
      development:
        clientId: ${AUTH_GITHUB_CLIENT_ID}
        clientSecret: ${AUTH_GITHUB_CLIENT_SECRET}
        ## uncomment if using GitHub Enterprise
        # enterpriseInstanceUrl: ${AUTH_GITHUB_ENTERPRISE_INSTANCE_URL}
        ## uncomment to set lifespan of user session
        # sessionDuration: { hours: 24 } # supports `ms` library format (e.g. '24h', '2 days'), ISO duration, "human duration" as used in code
        signIn:
          resolvers:
            # See https://backstage.io/docs/auth/github/provider#resolvers for more resolvers
            - resolver: emailMatchingUserEntityProfileEmail
            - resolver: usernameMatchingUserEntityName
catalog:
  rules:
    - allow: [Component, Template, System, API, Resource, Location]

  locations:
    # Absolute path inside the container (/app = volume mount root on host)
    - type: file
      target: /app/backstage/catalog/entities/users.yaml
      rules:
        - allow: [User]
    - type: file
      target: /app/backstage/catalog/entities/groups.yaml
      rules:
        - allow: [Group]
    # - type: url
    #   target: https://github.com/christseng89/backstage-software-templates/blob/main/python-app/template.yaml
    #   rules:
    #     - allow: [Template]
    - type: file
      target: /app/templates-python-app/template.yaml
      rules:
        - allow: [Template]

integrations:
  github:
    - host: github.com
      token: ${GITHUB_TOKEN}

kubernetes:
  serviceLocatorMethod:
    type: "multiTenant"
  clusterLocatorMethods:
    - type: "config"
      clusters:
        - name: docker-desktop
          url: https://host.docker.internal:6443
          authProvider: serviceAccount
          skipTLSVerify: true # API cert is self-signed and not for host.docker.internal
          serviceAccountToken: ${K8S_SA_TOKEN}
  customResources:
    - group: "argoproj.io" # to see ArgoCD Application for python-app
      apiVersion: "v1alpha1"
      plural: "applications"

techdocs:
  builder: "local"
  generator:
    runIn: "local" # ← was 'docker' in app-config.yaml; override here
  publisher:
    type: "local"
    local:
      publishDirectory: "/app/techdocs-storage"
