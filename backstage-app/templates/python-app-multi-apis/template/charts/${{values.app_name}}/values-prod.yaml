replicaCount: 3

# Prod — current production surface: v2 (deprecated, sunsetting), v3 + v4 stable.
# v5/v6 not deployed here yet (clients calling them get vanilla 404).
# v1 stays in REMOVED so legacy clients get a 410 with migration pointer
# instead of a confusing 404.
apiVersions:
  enabled: "v2,v3,v4"
  deprecated: "v2"
  removed: "v1"
  default: v4

image:
  tag: ""

ingress:
  hosts:
    - host: ${{values.app_name}}-prod.test.com
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 60m
    memory: 60M
  limits:
    cpu: 300m
    memory: 240M
