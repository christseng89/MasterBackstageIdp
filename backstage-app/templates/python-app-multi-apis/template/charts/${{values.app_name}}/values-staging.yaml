replicaCount: 2

# Staging — validates v3+v4+v5+v6 surface.  v6 is here as preview so customers
# integrating against it can hit a near-prod-like environment.  v1/v2 already
# retired (410 Gone) — staging serves as the "post-removal compatibility" check.
apiVersions:
  enabled: "v3,v4,v5,v6"
  deprecated: ""
  removed: "v1,v2"
  default: v4

image:
  tag: ""

ingress:
  hosts:
    - host: ${{values.app_name}}-staging.test.com
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 50m
    memory: 50M
  limits:
    cpu: 250m
    memory: 200M
