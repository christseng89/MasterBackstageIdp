commonLabels:
  backstage.io/kubernetes-id: ${{values.app_name}}
replicaCount: 1

# ---------------------------------------------------------------------------
# Multi-API-version metadata (env-driven routing)
# ---------------------------------------------------------------------------
# `apiVersions.*` controls which versions the running container exposes.
# Same image across dev/staging/prod — only this block differs per env.
#
#   enabled    — comma-list registered as normal routes
#   deprecated — subset of enabled; responses also get RFC 9745/8594 headers
#   removed    — versions that USED to exist; return 410 Gone with successor link
#   default    — primary version, used for app.kubernetes.io/version label
#                and DEFAULT_API_VERSION env (read by /version endpoint)
#
# Anything not in any of the three lists is simply not registered → vanilla 404
# (use this for versions "not yet deployed in this env", e.g. v5/v6 on prod).
#
# Override per env in values-{dev,staging,prod}.yaml.
apiVersions:
  enabled: "v3,v4"          # base default — most envs override this
  deprecated: ""
  removed: ""
  default: v4

# `git.sha` lets workflows inject the actual commit SHA into the running pod
# (visible via /version + /api/v4/metrics).  Falls back to image.tag when unset.
git:
  sha: ""

image:
  repository: christseng89/${{values.app_name}}
  pullPolicy: IfNotPresent
  # Placeholder — overridden by values-dev/staging/prod.yaml in the GitOps flow.
  tag: v4
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
podAnnotations: {}
podLabels: {}
serviceAccount:
  create: false
  automount: true
  annotations: {}
  name: ""
podSecurityContext: {}
securityContext: {}
service:
  type: ClusterIP
  port: 5000
ingress:
  enabled: true
  className: "nginx"
  annotations: {}
  hosts:
    - host: ${{values.app_name}}-dev.test.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
resources:
  requests:
    cpu: 50m
    memory: 50M
  limits:
    cpu: 200m
    memory: 200M
# Health probes hit the env's default API version's /healthz.  Each env's
# values-*.yaml overrides this if the default differs.
livenessProbe:
  httpGet:
    path: /api/v4/healthz
    port: http
readinessProbe:
  httpGet:
    path: /api/v4/healthz
    port: http
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
volumes: []
volumeMounts: []
nodeSelector: {}
tolerations: []
affinity: {}

# Runner integration — used by templates/runner-rolebinding.yaml.
runner:
  enabled: true
  namespace: github-runners
  serviceAccountName: ${{values.app_name}}-self-hosted-runner
