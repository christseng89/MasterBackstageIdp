replicaCount: 1

# Dev preview ships v3 as the default API surface (experimental) so the
# team can dogfood the new endpoints before promoting to staging/prod.
apiVersions:
  default: v3
  supported: "v1,v2,v3"
  deprecated: "v1"

image:
  tag: ""

ingress:
  hosts:
    - host: ${{values.app_name}}-dev.test.com
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 40m
    memory: 40M
  limits:
    cpu: 200m
    memory: 160M
