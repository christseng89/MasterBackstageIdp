replicaCount: 1

# Dev — runs the bleeding edge: v4 stable + v5 stable + v6 experimental.
# Older versions (v1/v2/v3) all 410 Gone; clients still on those in dev get
# an immediate, actionable error pointing at the successor.
apiVersions:
  enabled: "v4,v5,v6"
  deprecated: ""
  removed: "v1,v2,v3"
  default: v6

image:
  tag: ""

ingress:
  hosts:
    - host: ${{values.app_name}}-dev.test.com
      paths:
        - path: /
          pathType: Prefix

# Probes hit v6's healthz since dev's default is v6
livenessProbe:
  httpGet:
    path: /api/v6/healthz
    port: http
readinessProbe:
  httpGet:
    path: /api/v6/healthz
    port: http

resources:
  requests:
    cpu: 40m
    memory: 40M
  limits:
    cpu: 200m
    memory: 160M
