apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{values.app_name}}
  description: Python app that displays time - named ${{values.app_name}}
  annotations:
    github.com/project-slug: christseng89/${{values.app_name}}
    backstage.io/kubernetes-id: ${{values.app_name}}
    backstage.io/techdocs-ref: dir:.
  links:
    - url: http://${{values.app_name}}-dev.test.com:9080/
      title: Hello World (dev)
      icon: web
    - url: http://${{values.app_name}}-dev.test.com:9080/api/v1/info
      title: Service Info
      icon: dashboard
    - url: http://${{values.app_name}}-dev.test.com:9080/api/v1/healthz
      title: Health Check
      icon: techdocs
spec:
  type: service
  owner: development
  lifecycle: experimental
  providesApis:
    - ${{values.app_name}}-api
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: ${{values.app_name}}-api
  description: REST API exposed by ${{values.app_name}} — greeting, info, and health endpoints.
  tags:
    - rest
    - python
    - flask
  links:
    - url: http://${{values.app_name}}-dev.test.com:9080/api/v1/info
      title: Live /info endpoint
spec:
  type: openapi
  lifecycle: experimental
  owner: development
  definition:
    $text: ./openapi.yaml
